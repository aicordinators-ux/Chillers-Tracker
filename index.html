<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0f172a" />
<title>Chillers Survey — El Wagd</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface-2: #334155;
    --border: #475569;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --primary: #3b82f6;
    --primary-hover: #2563eb;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --info: #06b6d4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body { padding-bottom: 80px; }

  .header {
    background: linear-gradient(135deg, #1e3a8a 0%, #1e293b 100%);
    padding: 16px 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    position: sticky; top: 0; z-index: 1000;
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header .sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: 10px;
  }
  .stat {
    background: rgba(255,255,255,0.06);
    padding: 6px 4px;
    border-radius: 8px;
    text-align: center;
  }
  .stat .v { font-size: 16px; font-weight: 700; }
  .stat .l { font-size: 10px; color: var(--text-muted); }
  .stat.done .v { color: var(--success); }
  .stat.notdone .v { color: var(--warning); }
  .stat.remain .v { color: var(--text-muted); }

  .progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--success), #34d399);
    transition: width 0.3s;
  }

  .container { padding: 12px; max-width: 720px; margin: 0 auto; }

  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .controls input, .controls select {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    flex: 1;
    min-width: 0;
  }
  .controls input:focus, .controls select:focus {
    outline: none;
    border-color: var(--primary);
  }

  .filter-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
  }
  .filter-row select { padding: 8px 6px; font-size: 12px; }

  .tabs {
    display: flex;
    background: var(--surface);
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 10px;
    gap: 3px;
  }
  .tab {
    flex: 1;
    padding: 9px 6px;
    text-align: center;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
    user-select: none;
  }
  .tab.active { background: var(--primary); color: white; }

  .list { display: flex; flex-direction: column; gap: 8px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.05s;
  }
  .card:active { transform: scale(0.98); }
  .card.done { border-right: 4px solid var(--success); }
  .card.notdone { border-right: 4px solid var(--warning); }
  .card.pending { border-right: 4px solid var(--text-muted); }

  .card-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 4px;
    gap: 6px;
  }
  .card-name { font-weight: 700; font-size: 15px; }
  .card-code {
    background: rgba(59,130,246,0.15);
    color: #93c5fd;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-family: monospace;
    white-space: nowrap;
  }
  .card-meta {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .card-meta b { color: var(--text); font-weight: 600; }
  .card-status {
    display: inline-block;
    margin-top: 6px;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 5px;
    font-weight: 600;
  }
  .card-status.done { background: rgba(16,185,129,0.15); color: var(--success); }
  .card-status.notdone { background: rgba(245,158,11,0.15); color: var(--warning); }

  .card-ts {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
    font-family: monospace;
    letter-spacing: 0.3px;
  }

  .card-cs {
    display: inline-block;
    margin: 6px 0 0 6px;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 5px;
    font-weight: 600;
  }
  .card-cs.good { background: rgba(6,182,212,0.15); color: var(--info); }
  .card-cs.bad { background: rgba(239,68,68,0.15); color: var(--danger); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    z-index: 2000;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    width: 100%;
    max-width: 720px;
    max-height: 90vh;
    border-radius: 18px 18px 0 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: slideUp 0.25s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface-2);
  }
  .modal-title { font-weight: 700; font-size: 16px; }
  .modal-close {
    background: transparent; color: var(--text); border: 0;
    width: 30px; height: 30px;
    font-size: 22px; cursor: pointer;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-body { padding: 14px 16px; overflow-y: auto; flex: 1; }

  .info-grid {
    background: var(--bg);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 14px;
    font-size: 13px;
    line-height: 1.8;
  }
  .info-grid .row { display: flex; justify-content: space-between; gap: 8px; }
  .info-grid .label { color: var(--text-muted); }
  .info-grid .value { font-weight: 600; text-align: left; max-width: 65%; }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }

  .radio-group { display: flex; flex-direction: column; gap: 6px; }
  .radio-option {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }
  .radio-option input { accent-color: var(--primary); transform: scale(1.2); }
  .radio-option.selected { border-color: var(--primary); background: rgba(59,130,246,0.1); }

  textarea, .field input[type="text"] {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  textarea { min-height: 70px; }

  .gps-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-size: 12px;
  }
  .gps-box.captured { border-color: var(--success); background: rgba(16,185,129,0.05); }
  .gps-row { display: flex; justify-content: space-between; margin: 3px 0; }
  .gps-row .label { color: var(--text-muted); }
  .gps-row .value { font-family: monospace; font-size: 11px; }
  .distance { font-weight: 700; }
  .distance.ok { color: var(--success); }
  .distance.warn { color: var(--warning); }
  .distance.bad { color: var(--danger); }

  .btn {
    width: 100%;
    padding: 12px;
    border: 0;
    border-radius: 9px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    color: white;
    margin-top: 6px;
    transition: opacity 0.15s, transform 0.05s;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--primary); }
  .btn-success { background: var(--success); }
  .btn-secondary { background: var(--surface-2); }
  .btn-danger { background: var(--danger); }

  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface-2);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 9px;
    font-size: 13px;
    z-index: 3000;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }
  .toast.warn { background: var(--warning); color: #1e293b; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 999;
    padding: 6px 4px;
    padding-bottom: max(6px, env(safe-area-inset-bottom));
  }
  .nav-btn {
    flex: 1;
    background: transparent;
    color: var(--text-muted);
    border: 0;
    padding: 8px 4px;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    border-radius: 8px;
    font-family: inherit;
  }
  .nav-btn .ico { font-size: 20px; }
  .nav-btn.active { color: var(--primary); background: rgba(59,130,246,0.1); }

  .empty {
    text-align: center;
    padding: 40px 16px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .empty .ico { font-size: 48px; opacity: 0.4; margin-bottom: 10px; }

  #map { height: calc(100vh - 280px); border-radius: 10px; }
  .map-popup { font-size: 12px; line-height: 1.6; }
  .map-popup b { color: #1e293b; }

  .map-search-wrap {
    position: relative;
    margin-bottom: 8px;
  }
  #map-search {
    width: 100%;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 36px 10px 12px;
    font-size: 14px;
    font-family: inherit;
  }
  #map-search:focus {
    outline: none;
    border-color: var(--primary);
  }
  .map-search-clear {
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--surface-2);
    color: var(--text);
    border: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .map-search-results {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: 260px;
    overflow-y: auto;
    z-index: 500;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  }
  .map-search-item {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    font-size: 12px;
    transition: background 0.1s;
  }
  .map-search-item:last-child { border-bottom: 0; }
  .map-search-item:hover, .map-search-item.active { background: var(--surface-2); }
  .map-search-item .nm { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
  .map-search-item .mt { color: var(--text-muted); font-size: 11px; }
  .map-search-item .mt b { color: var(--text); }
  .map-search-empty {
    padding: 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
  }

  .truck-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .truck-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
  }
  .truck-card .name { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .truck-card .pct { font-size: 22px; font-weight: 800; }
  .truck-card .pct.high { color: var(--success); }
  .truck-card .pct.mid { color: var(--warning); }
  .truck-card .pct.low { color: var(--text-muted); }
  .truck-card .meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .truck-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .truck-bar-fill { height: 100%; background: var(--success); }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    flex-direction: column;
    gap: 14px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Reasons sub-block */
  .reasons-block {
    background: rgba(59,130,246,0.05);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 8px;
    padding: 10px;
    margin-top: 8px;
  }
  .reasons-block .title-mini {
    font-size: 12px;
    color: var(--primary);
    font-weight: 600;
    margin-bottom: 6px;
  }

  @media (min-width: 768px) {
    .truck-grid { grid-template-columns: repeat(4, 1fr); }
    .stats-bar { max-width: 600px; margin: 10px auto 0; }
  }
</style>
</head>

<div class="header">
  <h1>📦 Chillers Survey — El Wagd</h1>
  <div class="sub" id="subtitle">جاري تحميل البيانات...</div>
  <div class="stats-bar">
    <div class="stat"><div class="v" id="stat-total">0</div><div class="l">إجمالى</div></div>

<div class="container">

  <div id="view-list">

      <select id="filter-truck"><option value="">كل العربيات</option></select>

      <select id="filter-status">

        <option value="pending">لم تتم بعد</option>
        <option value="done">تم الزيارة</option>
        <option value="notdone">زيارات مؤجلة</option>
      </select>
    </div>
    <div class="controls">
      <input type="text" id="search-input" placeholder="🔍 بحث (كود، اسم، عنوان، ثلاجة)..." />
    </div>
    <div id="list-content" class="list">
      <div class="loading"><div class="spinner"></div><div>جاري التحميل...</div></div>

  </div>

  <!-- MAP VIEW -->
  <div id="view-map" style="display:none;">
    <div class="map-search-wrap">
      <input type="text" id="map-search" placeholder="🔍 كود العميل / اسم / كود الثلاجة..." autocomplete="off" />

  <!-- DASHBOARD VIEW -->

    <div class="truck-grid" id="truck-grid"></div>
    <div style="margin-top: 16px;">
      <button class="btn btn-success" id="btn-export">📥 تصدير Excel</button>
    </div>
  </div>

</div>

<!-- Survey Modal -->
<div class="modal-overlay" id="survey-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title" style="user-select:none; -webkit-user-select:none;">📝 تسجيل الزيارة</div>
      <button class="modal-close" onclick="closeSurvey()">✕</button>
    </div>
    <div class="modal-body" id="survey-body"></div>
  </div>
</div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <button class="nav-btn active" data-view="list"><span class="ico">📋</span><span>القائمة</span></button>
  <button class="nav-btn" data-view="map"><span class="ico">🗺️</span><span>الخريطة</span></button>
  <button class="nav-btn" data-view="dashboard"><span class="ico">📊</span><span>التقدم</span></button>
</div>

<div class="toast" id="toast"></div>

<script>
// =============================================================
// State
// =============================================================
let chillers = [];
let surveys = {};       // { chiller_code: { status, reason, notes, lat, lng, ts, ... } }
let currentChiller = null;
let currentGPS = null;
let map, markersLayer;

const STATUS_PENDING = 'pending';
const STATUS_DONE = 'done';
const STATUS_NOTDONE = 'notdone';

const REASONS_DONE = [
  "لا يوجد مشكلة",
  "لا يوجد ثلاجة",
  "الثلاجة بمخزن العميل ولم يتم تصويرها",
  "العميل رافض التعاون والتصوير",
  "لم يستدل على العميل في اللوكيشن المرسل",
  "مغلق نهائي",
  "سبب آخر"
];
const REASONS_NOTDONE = [
  "تم تأجيل الزيارة",
  "مغلق مؤقتاً",
  "سبب آخر"
];

// =============================================================
// Utils
// =============================================================
function $(id) { return document.getElementById(id); }
function escapeHtml(s) { return String(s||'').replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c])); }

function showToast(msg, type='info') {
  const t = $('toast');
  t.className = 'toast show ' + type;
  t.textContent = msg;
  setTimeout(() => t.className = 'toast', 2500);
}

function haversineDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000; // meters
  const toRad = d => d * Math.PI/180;
  const dLat = toRad(lat2-lat1), dLng = toRad(lng2-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return Math.round(2*R*Math.asin(Math.sqrt(a)));
}

function formatTimestamp(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, '0');
  const day = pad(d.getDate());
  const month = pad(d.getMonth() + 1);
  const year = d.getFullYear();
  let hh = d.getHours();
  const mm = pad(d.getMinutes());
  const ampm = hh >= 12 ? 'م' : 'ص';
  hh = hh % 12; if (hh === 0) hh = 12;
  return `${day}/${month}/${year} - ${hh}:${mm} ${ampm}`;
}

function getStatus(chillerCode) {
  const s = surveys[chillerCode];
  if (!s) return STATUS_PENDING;
  return s.status || STATUS_PENDING;
}

// =============================================================
// Firebase load
// =============================================================
window.addEventListener('firebase-ready', async () => {
  await loadChillers();
  subscribeToSurveys();
});

async function loadChillers() {
  try {
    const res = await fetch(window.CHILLERS_URL + '?v=' + Date.now());
    if (!res.ok) throw new Error('chillers.json fetch failed: ' + res.status);
    chillers = await res.json();
    populateFilters();
    $('subtitle').textContent = `${chillers.length} ثلاجة • ${new Set(chillers.map(c=>c.truck)).size} عربية`;
  } catch (e) {
    console.error(e);
    showToast('فشل تحميل قائمة الثلاجات', 'error');
    $('list-content').innerHTML = `<div class="empty"><div class="ico">⚠️</div>تعذر تحميل ملف chillers.json<br><small>${escapeHtml(e.message)}</small></div>`;
  }
}

function subscribeToSurveys() {
  const surveysRef = window.fb.ref(window.fb.db, 'surveys');
  window.fb.onValue(surveysRef, snap => {
    surveys = snap.val() || {};
    renderAll();
  }, err => {
    console.error(err);
    showToast('فشل الاتصال بـ Firebase — تأكد من firebaseConfig وقواعد الأمان', 'error');
  });
}

// =============================================================
// Render
// =============================================================
function renderAll() {
  renderStats();
  renderList();
  renderMapMarkers();
  renderDashboard();
}

function renderStats() {
  // Apply current filters (truck, distributor, search) — but NOT status filter
  // so the user sees the full breakdown of the current scope
  const q = $('search-input') ? $('search-input').value.trim().toLowerCase() : '';
  const ft = $('filter-truck') ? $('filter-truck').value : '';
  const fd = $('filter-distributor') ? $('filter-distributor').value : '';

  const scope = chillers.filter(c => {
    if (ft && c.truck !== ft) return false;
    if (fd && c.distributor !== fd) return false;
    if (q) {
      const hay = `${c.cust_code} ${c.customer_name} ${c.chiller_code} ${c.address} ${c.truck}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const total = scope.length;
  let done = 0, notdone = 0;
  scope.forEach(c => {
    const st = getStatus(c.chiller_code);
    if (st === STATUS_DONE) done++;
    else if (st === STATUS_NOTDONE) notdone++;
  });
  const remain = total - done - notdone;
  $('stat-total').textContent = total;
  $('stat-done').textContent = done;
  $('stat-notdone').textContent = notdone;
  $('stat-remain').textContent = remain;
  const pct = total ? ((done+notdone)/total*100) : 0;
  $('progress-fill').style.width = pct.toFixed(1) + '%';
}

function populateFilters() {
  const trucks = [...new Set(chillers.map(c=>c.truck))].sort();
  const distributors = [...new Set(chillers.map(c=>c.distributor))].sort();
  const fT = $('filter-truck'), fD = $('filter-distributor');
  trucks.forEach(t => { const o=document.createElement('option'); o.value=t; o.textContent=t; fT.appendChild(o); });
  distributors.forEach(d => { const o=document.createElement('option'); o.value=d; o.textContent=d; fD.appendChild(o); });
  [fT, fD, $('filter-status'), $('search-input')].forEach(el => el.addEventListener('input', () => { renderList(); renderStats(); }));
}

function getFilteredChillers() {
  const q = $('search-input').value.trim().toLowerCase();
  const ft = $('filter-truck').value;
  const fd = $('filter-distributor').value;
  const fs = $('filter-status').value;
  return chillers.filter(c => {
    if (ft && c.truck !== ft) return false;
    if (fd && c.distributor !== fd) return false;
    if (fs && getStatus(c.chiller_code) !== fs) return false;
    if (q) {
      const hay = `${c.cust_code} ${c.customer_name} ${c.chiller_code} ${c.address} ${c.truck}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderList() {
  const filtered = getFilteredChillers();
  const root = $('list-content');
  if (!filtered.length) {
    root.innerHTML = `<div class="empty"><div class="ico">🔍</div>لا توجد نتائج</div>`;
    return;
  }
  // Cap to 200 for perf, with "load more" hint
  const cap = 300;
  const visible = filtered.slice(0, cap);
  const html = visible.map(c => {
    const st = getStatus(c.chiller_code);
    const stClass = st === STATUS_DONE ? 'done' : st === STATUS_NOTDONE ? 'notdone' : 'pending';
    const stText = st === STATUS_DONE ? '✓ تم الزيارة' : st === STATUS_NOTDONE ? '⏸ زيارة مؤجلة' : '';
    const survey = surveys[c.chiller_code];
    const reason = survey?.reason ? ` • ${escapeHtml(survey.reason)}` : '';
    const tsText = survey?.ts ? formatTimestamp(survey.ts) : '';
    const csBadge = survey?.chiller_status
      ? `<span class="card-cs ${survey.chiller_status === 'مخالفة' ? 'bad' : 'good'}">${survey.chiller_status === 'مخالفة' ? '⚠️' : '✓'} ${escapeHtml(survey.chiller_status)}</span>`
      : '';
    return `
      <div class="card ${stClass}" onclick="openSurvey('${c.chiller_code}')">
        <div class="card-row">
          <div class="card-name">${escapeHtml(c.customer_name)}</div>
          <div class="card-code">${escapeHtml(c.truck)}</div>
        </div>
        <div class="card-meta">
          <b>كود العميل:</b> ${escapeHtml(c.cust_code)} • <b>ثلاجة:</b> ${escapeHtml(c.chiller_code)}<br>
          📍 ${escapeHtml(c.address.substring(0, 80))}${c.address.length>80?'...':''}
        </div>
        ${stText ? `<span class="card-status ${stClass}">${stText}${reason}</span>` : ''}
        ${csBadge}
        ${tsText ? `<div class="card-ts">🕒 ${tsText}</div>` : ''}
      </div>
    `;
  }).join('');
  const more = filtered.length > cap ? `<div class="empty" style="padding:14px;font-size:12px;">عرض ${cap} من ${filtered.length} — استخدم البحث للتصفية</div>` : '';
  root.innerHTML = html + more;
}

// =============================================================
// Survey modal
// =============================================================
function openSurvey(chillerCode) {
  const c = chillers.find(x => x.chiller_code === chillerCode);
  if (!c) return;
  currentChiller = c;
  currentGPS = null;
  const existing = surveys[chillerCode] || {};

  const body = $('survey-body');
  body.innerHTML = `
    <div class="info-grid">
      <div class="row"><span class="label">العميل:</span><span class="value">${escapeHtml(c.customer_name)}</span></div>
      <div class="row"><span class="label">الكود:</span><span class="value">${escapeHtml(c.cust_code)}</span></div>
      <div class="row"><span class="label">الثلاجة:</span><span class="value">${escapeHtml(c.chiller_code)}</span></div>
      <div class="row"><span class="label">العربية:</span><span class="value">${escapeHtml(c.truck)}</span></div>
      <div class="row"><span class="label">العنوان:</span><span class="value">${escapeHtml(c.address)}</span></div>
      <div class="row"><span class="label">الإحداثيات:</span><span class="value"><a href="${escapeHtml(c.maps_url)}" target="_blank" style="color:#60a5fa;">فتح في Maps</a></span></div>
    </div>

    <div class="field">
      <label>📍 GPS (موقعك الحالي)</label>
      <div id="gps-box" class="gps-box">
        <div style="text-align:center; color:var(--text-muted);">لم يتم تحديد الموقع بعد</div>
      </div>
      <button class="btn btn-secondary" onclick="captureGPS()" style="margin-top:6px;">📡 تحديد موقعي الحالي</button>
    </div>

    <div class="field">
      <label>1) حالة الزيارة *</label>
      <div class="radio-group">
        <label class="radio-option" data-status="${STATUS_DONE}">
          <input type="radio" name="status" value="${STATUS_DONE}" onchange="onStatusChange(this.value)">
          <span>✓ تم الزيارة</span>
        </label>
        <label class="radio-option" data-status="${STATUS_NOTDONE}">
          <input type="radio" name="status" value="${STATUS_NOTDONE}" onchange="onStatusChange(this.value)">
          <span>⏸ زيارة مؤجلة</span>
        </label>
      </div>
    </div>

    <div id="reasons-container"></div>

    <div class="field" id="chiller-status-container" style="display:none;">
      <label>3) حالة الثلاجة *</label>
      <div class="radio-group">
        <label class="radio-option" data-chiller-status="مخالفة">
          <input type="radio" name="chiller_status" value="مخالفة" onchange="onChillerStatusChange(this.value)">
          <span>⚠️ مخالفة</span>
        </label>
        <label class="radio-option" data-chiller-status="غير مخالفة">
          <input type="radio" name="chiller_status" value="غير مخالفة" onchange="onChillerStatusChange(this.value)">
          <span>✓ غير مخالفة</span>
        </label>
      </div>
    </div>

    <div class="field" id="notes-container" style="display:none;">
      <label>4) ملاحظات</label>
      <textarea id="notes-input" placeholder="اكتب الملاحظات هنا..."></textarea>
    </div>

    <div class="field" id="other-reason-container" style="display:none;">
      <label>السبب الآخر *</label>
      <input type="text" id="other-reason-input" placeholder="اكتب السبب..." />
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeSurvey()">إلغاء</button>
      <button class="btn btn-success" id="btn-save" onclick="saveSurvey()">💾 حفظ</button>
    </div>

    <button class="btn btn-danger" id="btn-delete" style="display:none; margin-top:12px;" onclick="deleteSurvey()">🗑️ حذف هذه الزيارة</button>
  `;

  // Pre-fill if existing
  if (existing.status) {
    setTimeout(() => {
      const r = body.querySelector(`input[name="status"][value="${existing.status}"]`);
      if (r) { r.checked = true; onStatusChange(existing.status); }
      if (existing.reason) {
        setTimeout(() => {
          const rr = body.querySelector(`input[name="reason"][value="${CSS.escape(existing.reason)}"]`);
          if (rr) { rr.checked = true; onReasonChange(existing.reason); }
          else if (existing.reason && !REASONS_DONE.includes(existing.reason) && !REASONS_NOTDONE.includes(existing.reason)) {
            // It was "other" with custom text
            const otherRadio = body.querySelector('input[name="reason"][value="سبب آخر"]');
            if (otherRadio) { otherRadio.checked = true; onReasonChange("سبب آخر"); }
            $('other-reason-input').value = existing.reason;
          }
          // After onReasonChange runs, chiller-status field may have appeared — fill it now
          if (existing.chiller_status) {
            const cs = body.querySelector(`input[name="chiller_status"][value="${CSS.escape(existing.chiller_status)}"]`);
            if (cs) { cs.checked = true; onChillerStatusChange(existing.chiller_status); }
          }
        }, 50);
      }
      if (existing.notes) $('notes-input').value = existing.notes;
      if (existing.lat && existing.lng) {
        currentGPS = { lat: existing.lat, lng: existing.lng, accuracy: existing.gps_accuracy };
        renderGPSBox();
      }
    }, 50);
  }

  $('survey-modal').classList.add('show');

  // Hidden delete: long-press (1.5s) on modal title reveals the delete button (only if a survey exists)
  setupLongPressDelete();
}

function setupLongPressDelete() {
  const title = $('modal-title');
  const btn = $('btn-delete');
  if (!title || !btn) return;
  btn.style.display = 'none'; // reset on each open

  let timer = null;
  let originalTitle = title.textContent;

  const start = (e) => {
    if (timer) return;
    // Only allow if survey exists for current chiller
    if (!currentChiller) return;
    const key = currentChiller.chiller_code.replace(/[.#$/\[\]]/g, '_');
    if (!surveys[key] && !surveys[currentChiller.chiller_code]) return;

    timer = setTimeout(() => {
      btn.style.display = 'block';
      btn.scrollIntoView({ behavior: 'smooth', block: 'end' });
      showToast('⚙️ وضع الحذف مفعّل', 'warn');
      timer = null;
    }, 1500);
  };

  const cancel = () => {
    if (timer) { clearTimeout(timer); timer = null; }
  };

  // Touch (mobile)
  title.ontouchstart = start;
  title.ontouchend = cancel;
  title.ontouchcancel = cancel;
  title.ontouchmove = cancel;
  // Mouse (desktop)
  title.onmousedown = start;
  title.onmouseup = cancel;
  title.onmouseleave = cancel;
}

function closeSurvey() {
  $('survey-modal').classList.remove('show');
  currentChiller = null;
  currentGPS = null;
}

function onStatusChange(status) {
  // Update visual selection
  document.querySelectorAll('.radio-option[data-status]').forEach(el => {
    el.classList.toggle('selected', el.dataset.status === status);
  });

  const reasons = status === STATUS_DONE ? REASONS_DONE : REASONS_NOTDONE;
  const html = `
    <div class="field">
      <label>2) ${status === STATUS_DONE ? 'سبب الحالة' : 'سبب التأجيل'} *</label>
      <div class="radio-group">
        ${reasons.map(r => `
          <label class="radio-option" data-reason="${escapeHtml(r)}">
            <input type="radio" name="reason" value="${escapeHtml(r)}" onchange="onReasonChange(this.value)">
            <span>${escapeHtml(r)}</span>
          </label>
        `).join('')}
      </div>
    </div>
  `;
  $('reasons-container').innerHTML = html;
  $('notes-container').style.display = 'block';
  $('chiller-status-container').style.display = 'none';
  $('other-reason-container').style.display = 'none';
}

function onChillerStatusChange(value) {
  document.querySelectorAll('.radio-option[data-chiller-status]').forEach(el => {
    el.classList.toggle('selected', el.dataset.chillerStatus === value);
  });
}

function onReasonChange(reason) {
  document.querySelectorAll('.radio-option[data-reason]').forEach(el => {
    el.classList.toggle('selected', el.dataset.reason === reason);
  });
  const isOther = reason === 'سبب آخر' || reason === 'سبب أخر';
  $('other-reason-container').style.display = isOther ? 'block' : 'none';
  // Chiller status appears ONLY when "لا يوجد مشكلة"
  const showChillerStatus = reason === 'لا يوجد مشكلة';
  $('chiller-status-container').style.display = showChillerStatus ? 'block' : 'none';
  if (!showChillerStatus) {
    // Clear any previously selected chiller_status
    document.querySelectorAll('input[name="chiller_status"]').forEach(r => r.checked = false);
    document.querySelectorAll('.radio-option[data-chiller-status]').forEach(el => el.classList.remove('selected'));
  }
}

function captureGPS() {
  if (!navigator.geolocation) {
    showToast('المتصفح لا يدعم تحديد الموقع', 'error');
    return;
  }
  $('gps-box').innerHTML = `<div style="text-align:center;color:var(--text-muted);">⏳ جاري تحديد الموقع...</div>`;
  navigator.geolocation.getCurrentPosition(
    pos => {
      currentGPS = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: Math.round(pos.coords.accuracy)
      };
      renderGPSBox();
    },
    err => {
      showToast('فشل تحديد الموقع: ' + err.message, 'error');
      $('gps-box').innerHTML = `<div style="text-align:center;color:var(--danger);">فشل: ${err.message}</div>`;
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

function renderGPSBox() {
  const box = $('gps-box');
  if (!currentGPS) return;
  const dist = haversineDistance(currentGPS.lat, currentGPS.lng, currentChiller.lat, currentChiller.lng);
  let cls = 'ok', label = 'قريب';
  if (dist > 100) { cls = 'warn'; label = 'بعيد نسبياً'; }
  if (dist > 500) { cls = 'bad'; label = 'بعيد جداً'; }
  box.classList.add('captured');
  box.innerHTML = `
    <div class="gps-row"><span class="label">Latitude:</span><span class="value">${currentGPS.lat.toFixed(6)}</span></div>
    <div class="gps-row"><span class="label">Longitude:</span><span class="value">${currentGPS.lng.toFixed(6)}</span></div>
    <div class="gps-row"><span class="label">دقة:</span><span class="value">±${currentGPS.accuracy}م</span></div>
    <div class="gps-row"><span class="label">المسافة من الثلاجة:</span><span class="value distance ${cls}">${dist}م (${label})</span></div>
  `;
}

async function saveSurvey() {
  const c = currentChiller;
  if (!c) return;
  const status = document.querySelector('input[name="status"]:checked')?.value;
  if (!status) { showToast('اختر حالة الزيارة', 'warn'); return; }

  const reasonRadio = document.querySelector('input[name="reason"]:checked');
  if (!reasonRadio) { showToast('اختر السبب', 'warn'); return; }
  let reason = reasonRadio.value;
  if (reason === 'سبب آخر' || reason === 'سبب أخر') {
    const other = $('other-reason-input').value.trim();
    if (!other) { showToast('اكتب السبب الآخر', 'warn'); return; }
    reason = other;
  }

  const notes = $('notes-input').value.trim();

  // Chiller status — required only when reason is "لا يوجد مشكلة"
  let chillerStatus = '';
  if (reason === 'لا يوجد مشكلة') {
    const csRadio = document.querySelector('input[name="chiller_status"]:checked');
    if (!csRadio) { showToast('اختر حالة الثلاجة (مخالفة / غير مخالفة)', 'warn'); return; }
    chillerStatus = csRadio.value;
  }

  const data = {
    chiller_code: c.chiller_code,
    cust_code: c.cust_code,
    customer_name: c.customer_name,
    truck: c.truck,
    distributor: c.distributor,
    status,
    reason,
    chiller_status: chillerStatus,
    notes,
    ts: Date.now(),
    ts_iso: new Date().toISOString()
  };

  if (currentGPS) {
    data.lat = currentGPS.lat;
    data.lng = currentGPS.lng;
    data.gps_accuracy = currentGPS.accuracy;
    data.distance_m = haversineDistance(currentGPS.lat, currentGPS.lng, c.lat, c.lng);
  }

  const btn = $('btn-save');
  btn.disabled = true; btn.textContent = '⏳ جاري الحفظ...';

  try {
    const key = c.chiller_code.replace(/[.#$/\[\]]/g, '_');
    await window.fb.set(window.fb.ref(window.fb.db, 'surveys/' + key), data);
    showToast('✓ تم الحفظ بنجاح', 'success');
    closeSurvey();
  } catch (e) {
    console.error(e);
    showToast('فشل الحفظ: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '💾 حفظ';
  }
}

async function deleteSurvey() {
  const c = currentChiller;
  if (!c) return;
  const key = c.chiller_code.replace(/[.#$/\[\]]/g, '_');
  if (!surveys[key] && !surveys[c.chiller_code]) {
    showToast('لا توجد زيارة محفوظة للحذف', 'warn');
    return;
  }
  const confirmMsg = `هل أنت متأكد من حذف زيارة:\n\n${c.customer_name}\nثلاجة: ${c.chiller_code}\n\nلا يمكن التراجع عن هذا الإجراء.`;
  if (!confirm(confirmMsg)) return;

  const btn = $('btn-delete');
  btn.disabled = true; btn.textContent = '⏳ جاري الحذف...';
  try {
    await window.fb.remove(window.fb.ref(window.fb.db, 'surveys/' + key));
    // Also try the unsanitized key in case it was saved differently
    if (key !== c.chiller_code) {
      try { await window.fb.remove(window.fb.ref(window.fb.db, 'surveys/' + c.chiller_code)); } catch(e){}
    }
    showToast('✓ تم حذف الزيارة', 'success');
    closeSurvey();
  } catch (e) {
    console.error(e);
    showToast('فشل الحذف: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '🗑️ حذف هذه الزيارة';
  }
}

// Map view
// =============================================================
let chillerMarkers = {};   // chiller_code → L.circleMarker
let highlightMarker = null;

function initMap() {
  if (map) return;
  map = L.map('map').setView([30.05, 31.25], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);

  // Hide search results when map is clicked
  map.on('click', () => hideMapSearchResults());

  // Wire up search box
  const searchInput = $('map-search');
  if (searchInput) {
    searchInput.addEventListener('input', onMapSearchInput);
    searchInput.addEventListener('focus', () => {
      if (searchInput.value.trim()) onMapSearchInput();
    });
  }
  document.addEventListener('click', e => {
    const wrap = document.querySelector('.map-search-wrap');
    if (wrap && !wrap.contains(e.target)) hideMapSearchResults();
  });
}

function renderMapMarkers() {
  if (!markersLayer) return;
  markersLayer.clearLayers();
  chillerMarkers = {};
  chillers.forEach(c => {
    const st = getStatus(c.chiller_code);
    const color = st === STATUS_DONE ? '#10b981' : st === STATUS_NOTDONE ? '#f59e0b' : '#94a3b8';
    const marker = L.circleMarker([c.lat, c.lng], {
      radius: 6, fillColor: color, color: '#fff', weight: 1, fillOpacity: 0.9
    });
    marker.bindPopup(`
      <div class="map-popup">
        <b>${escapeHtml(c.customer_name)}</b><br>
        كود: ${escapeHtml(c.cust_code)}<br>
        ثلاجة: ${escapeHtml(c.chiller_code)}<br>
        عربية: ${escapeHtml(c.truck)}<br>
        <a href="javascript:void(0)" onclick="openSurvey('${c.chiller_code}')">📝 فتح السيرفي</a>
      </div>
    `);
    markersLayer.addLayer(marker);
    chillerMarkers[c.chiller_code] = marker;
  });
}

// ----- Map search -----
function onMapSearchInput() {
  const q = $('map-search').value.trim().toLowerCase();
  $('map-search-clear').style.display = q ? 'flex' : 'none';
  if (!q) { hideMapSearchResults(); return; }
  const results = chillers.filter(c => {
    return (c.cust_code || '').toLowerCase().includes(q)
        || (c.customer_name || '').toLowerCase().includes(q)
        || (c.chiller_code || '').toLowerCase().includes(q)
        || (c.truck || '').toLowerCase().includes(q);
  }).slice(0, 30);
  showMapSearchResults(results, q);
}

function showMapSearchResults(results, q) {
  const box = $('map-search-results');
  if (!results.length) {
    box.innerHTML = `<div class="map-search-empty">لا توجد نتائج لـ "${escapeHtml(q)}"</div>`;
    box.style.display = 'block';
    return;
  }
  box.innerHTML = results.map(c => `
    <div class="map-search-item" onclick="focusOnChiller('${escapeHtml(c.chiller_code).replace(/'/g, "&#39;")}')">
      <div class="nm">${escapeHtml(c.customer_name)}</div>
      <div class="mt"><b>${escapeHtml(c.cust_code)}</b> • ${escapeHtml(c.chiller_code)} • 🚚 ${escapeHtml(c.truck)}</div>
    </div>
  `).join('');
  box.style.display = 'block';
}

function hideMapSearchResults() {
  const box = $('map-search-results');
  if (box) box.style.display = 'none';
}

function clearMapSearch() {
  $('map-search').value = '';
  $('map-search-clear').style.display = 'none';
  hideMapSearchResults();
  if (highlightMarker && map) {
    map.removeLayer(highlightMarker);
    highlightMarker = null;
  }
}

function focusOnChiller(chillerCode) {
  const c = chillers.find(x => x.chiller_code === chillerCode);
  if (!c || !map) return;
  hideMapSearchResults();
  // Zoom in
  map.setView([c.lat, c.lng], 17, { animate: true });
  // Remove old highlight
  if (highlightMarker) map.removeLayer(highlightMarker);
  // Pulsing highlight ring
  highlightMarker = L.circleMarker([c.lat, c.lng], {
    radius: 18,
    fillColor: '#3b82f6',
    color: '#3b82f6',
    weight: 3,
    fillOpacity: 0.25
  }).addTo(map);
  // Open popup of the actual marker
  const original = chillerMarkers[chillerCode];
  if (original) setTimeout(() => original.openPopup(), 300);
}

// =============================================================
// Dashboard
// =============================================================
function renderDashboard() {
  const grid = $('truck-grid');
  if (!grid) return;
  const byTruck = {};
  chillers.forEach(c => {
    if (!byTruck[c.truck]) byTruck[c.truck] = { total: 0, done: 0, notdone: 0 };
    byTruck[c.truck].total++;
    const st = getStatus(c.chiller_code);
    if (st === STATUS_DONE) byTruck[c.truck].done++;
    else if (st === STATUS_NOTDONE) byTruck[c.truck].notdone++;
  });
  const sorted = Object.entries(byTruck).sort((a,b) => b[1].total - a[1].total);
  grid.innerHTML = sorted.map(([truck, s]) => {
    const completed = s.done + s.notdone;
    const pct = s.total ? (completed/s.total*100) : 0;
    const cls = pct >= 80 ? 'high' : pct >= 40 ? 'mid' : 'low';
    return `
      <div class="truck-card">
        <div class="name">🚚 ${escapeHtml(truck)}</div>
        <div class="pct ${cls}">${pct.toFixed(0)}%</div>
        <div class="meta">${completed}/${s.total} • ✓${s.done} ✗${s.notdone}</div>
        <div class="truck-bar"><div class="truck-bar-fill" style="width:${pct}%"></div></div>
      </div>
    `;
  }).join('');
}

// =============================================================
// Export
// =============================================================
function exportExcel() {
  const rows = chillers.map(c => {
    const s = surveys[c.chiller_code.replace(/[.#$/\[\]]/g, '_')] || surveys[c.chiller_code] || {};
    return {
      '#': c.id,
      'Distributor': c.distributor,
      'Cust_Code': c.cust_code,
      'Truck': c.truck,
      'Customer Name': c.customer_name,
      'Chiller Code': c.chiller_code,
      'Address': c.address,
      'Master_Lat': c.lat,
      'Master_Lng': c.lng,
      'Master_MapsURL': c.maps_url,
      'Visit Status': s.status === STATUS_DONE ? 'تم الزيارة' : s.status === STATUS_NOTDONE ? 'زيارة مؤجلة' : '',
      'Reason': s.reason || '',
      'Chiller_Status': s.chiller_status || '',
      'Notes': s.notes || '',
      'GPS_Lat': s.lat || '',
      'GPS_Lng': s.lng || '',
      'GPS_Accuracy_m': s.gps_accuracy || '',
      'Distance_m': s.distance_m || '',
      'Timestamp': s.ts_iso || ''
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Survey');
  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `Chillers_Survey_${date}.xlsx`);
  showToast('✓ تم تصدير الملف', 'success');
}

// =============================================================
// Navigation
// =============================================================
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const view = btn.dataset.view;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b === btn));
    $('view-list').style.display = view === 'list' ? 'block' : 'none';
    $('view-map').style.display = view === 'map' ? 'block' : 'none';
    $('view-dashboard').style.display = view === 'dashboard' ? 'block' : 'none';
    if (view === 'map') { initMap(); setTimeout(()=>{ map.invalidateSize(); renderMapMarkers(); }, 50); }
  });
});

$('btn-export').addEventListener('click', exportExcel);

// Expose for inline handlers
window.openSurvey = openSurvey;
window.closeSurvey = closeSurvey;
window.onStatusChange = onStatusChange;
window.onReasonChange = onReasonChange;
window.onChillerStatusChange = onChillerStatusChange;
window.captureGPS = captureGPS;
window.saveSurvey = saveSurvey;
window.deleteSurvey = deleteSurvey;
window.focusOnChiller = focusOnChiller;
window.clearMapSearch = clearMapSearch;

// Close on backdrop click
$('survey-modal').addEventListener('click', e => {
  if (e.target.id === 'survey-modal') closeSurvey();
});
</script>
